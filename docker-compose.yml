services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rounds-server
    shm_size: '2gb'
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:./data/prod.db
      - DISABLE_SCHEDULER=${DISABLE_SCHEDULER:-false}
      - SCHEDULER_CHECK_INTERVAL_MINUTES=${SCHEDULER_CHECK_INTERVAL_MINUTES:-1}
    volumes:
      - server-data:/app/data
      - server-screenshots:/app/storage/screenshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
    container_name: rounds-web
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  server-data:
  server-screenshots:
